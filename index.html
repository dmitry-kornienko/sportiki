<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sportiki Merch</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --white: #f5f3ef;
    --accent: #1a2744;
    --pink: #e8a0b0;
    --slate: #3d4f6b;
    --gray: #8a8a8a;
    --light: #ebebeb;
    --card-bg: #ffffff;
    --border: #e0ddd8;
  }

  html, body {
    height: 100%;
    background: var(--white);
    color: var(--black);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--white);
    border-bottom: 1.5px solid var(--border);
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span {
    font-weight: 400;
    font-size: 10px;
    display: block;
    letter-spacing: 0.2em;
    color: var(--gray);
    margin-bottom: -2px;
  }

  .cart-btn {
    position: relative;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 50px;
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.05em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.15s, background 0.15s;
  }

  .cart-btn:active { transform: scale(0.95); }
  .cart-btn.has-items { background: var(--black); }

  .cart-count {
    background: var(--pink);
    color: var(--black);
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 11px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
  }

  .cart-btn.has-items .cart-count { display: flex; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    padding: 16px 20px 0;
    gap: 8px;
    border-bottom: 1.5px solid var(--border);
    background: var(--white);
  }

  .tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray);
    background: none;
    border: none;
    padding: 6px 14px 10px;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }

  .tab.active {
    color: var(--accent);
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1.5px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }

  /* ── PRODUCT GRID ── */
  .screen { display: none; padding: 20px; }
  .screen.active { display: block; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .product-card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .product-card:active { transform: scale(0.97); }

  .product-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--light);
    display: block;
  }

  .product-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }

  .product-info {
    padding: 10px 12px 12px;
  }

  .product-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--black);
    line-height: 1.1;
  }

  .product-colors {
    display: flex;
    gap: 5px;
    margin-top: 7px;
    flex-wrap: wrap;
  }

  .color-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.15);
  }

  .product-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    margin-top: 6px;
  }

  /* ── PRODUCT DETAIL ── */
  .detail-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--white);
    z-index: 200;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }

  .detail-screen.active { display: block; }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .detail-header {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    gap: 12px;
    border-bottom: 1.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--black);
    transition: background 0.15s;
  }

  .back-btn:active { background: var(--light); }

  .detail-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .detail-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--light);
    display: block;
    transition: opacity 0.2s;
  }

  .detail-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
  }

  .detail-body {
    padding: 20px;
  }

  .detail-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 1;
  }

  .detail-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--accent);
    margin-top: 4px;
  }

  .detail-desc {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.5;
    margin-top: 12px;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray);
    margin-top: 20px;
    margin-bottom: 10px;
  }

  .color-options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .color-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }

  .color-swatch {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
  }

  .color-option.selected .color-swatch {
    border-color: var(--accent);
    transform: scale(1.1);
  }

  .color-label {
    font-size: 11px;
    color: var(--gray);
    font-weight: 500;
  }

  .add-btn {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }

  .add-btn:active { transform: scale(0.98); }
  .add-btn:disabled { background: var(--gray); cursor: default; }

  .add-btn.added {
    background: #2d6a4f;
  }

  /* ── CART ── */
  .cart-empty {
    text-align: center;
    padding: 60px 20px;
  }

  .cart-empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .cart-empty-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray);
  }

  .cart-items { display: flex; flex-direction: column; gap: 12px; }

  .cart-item {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cart-item-img {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    object-fit: cover;
    background: var(--light);
    flex-shrink: 0;
  }

  .cart-item-img-placeholder {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    background: var(--light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .cart-item-info { flex: 1; }

  .cart-item-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .cart-item-detail {
    font-size: 13px;
    color: var(--gray);
    margin-top: 2px;
  }

  .cart-item-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    margin-top: 4px;
  }

  .remove-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--gray);
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  .remove-btn:active { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

  .cart-footer {
    margin-top: 20px;
    padding: 16px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
  }

  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .cart-total-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray);
  }

  .cart-total-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 24px;
    color: var(--black);
  }

  .cart-note {
    font-size: 12px;
    color: var(--gray);
    text-align: center;
    margin-bottom: 14px;
    line-height: 1.4;
  }

  .checkout-btn {
    width: 100%;
    padding: 16px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .checkout-btn:active { transform: scale(0.98); }

  /* ── SUCCESS ── */
  .success-screen {
    display: none;
    text-align: center;
    padding: 60px 30px;
  }

  .success-screen.active { display: block; }

  .success-icon {
    font-size: 64px;
    margin-bottom: 16px;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0%   { transform: scale(0); }
    70%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .success-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--black);
    margin-bottom: 8px;
  }

  .success-text {
    font-size: 15px;
    color: var(--gray);
    line-height: 1.5;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--black);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 50px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.05em;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <span>Expat Community</span>
    Sportiki
  </div>
  <button class="cart-btn" id="cartBtn" onclick="showCart()">
    🛒 Корзина
    <span class="cart-count" id="cartCount">0</span>
  </button>
</div>

<!-- TABS -->
<div class="tabs" id="mainTabs">
  <button class="tab active" onclick="showTab('shop')">Каталог</button>
  <button class="tab" onclick="showTab('cart')">Моя корзина</button>
</div>

<!-- SHOP SCREEN -->
<div class="screen active" id="shopScreen">
  <div class="grid" id="productGrid"></div>
</div>

<!-- CART SCREEN -->
<div class="screen" id="cartScreen">
  <div id="cartContent"></div>
</div>

<!-- PRODUCT DETAIL -->
<div class="detail-screen" id="detailScreen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitle"></div>
  </div>
  <div id="detailImg"></div>
  <div class="detail-body">
    <div class="detail-name" id="detailName"></div>
    <div class="detail-price" id="detailPrice"></div>
    <div class="detail-desc" id="detailDesc"></div>
    <div class="section-label">Выбери цвет</div>
    <div class="color-options" id="colorOptions"></div>
    <button class="add-btn" id="addBtn" onclick="addToCart()" disabled>Выбери цвет</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── UTILS ──
function formatPrice(p) { return p.toLocaleString("ru-RU") + " ₫"; }

// ── DATA ──
const PRODUCTS = [
  {
    id: 'tshirt',
    name: 'T-Shirt',
    price: 350000,
    currency: 'VND',
    description: 'Оверсайз футболка с принтом Sportiki. 100% хлопок, унисекс. Подходит для тренировок и повседневной носки.',
    emoji: '👕',
    colors: [
      { name: 'White',  hex: '#f5f3ef', img: 'images/tshirt-white.PNG' },
      { name: 'Pink',   hex: '#e8a0b0', img: 'images/tshirt-pink.PNG' },
      { name: 'Slate',  hex: '#3d4f6b', img: 'images/tshirt-slate.PNG' },
    ]
  },
  {
    id: 'tank',
    name: 'Tank Top',
    price: 350000,
    currency: 'VND',
    description: 'Лёгкая майка без рукавов с принтом Sportiki. Унисекс. Идеально для пляжа и тренировок.',
    emoji: '🎽',
    colors: [
      { name: 'White', hex: '#f5f3ef', img: 'images/tank-white.PNG' },
      { name: 'Black', hex: '#0d0d0d', img: 'images/tank-black.PNG' },
    ]
  }
];

let cart = [];
let currentProduct = null;
let selectedColor = null;

// ── INIT ──
window.addEventListener('load', () => {
  if (window.Telegram?.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
  renderProducts();
});

// ── RENDER PRODUCTS ──
function renderProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = PRODUCTS.map(p => {
    const firstColor = p.colors[0];
    const dots = p.colors.map(c =>
      `<div class="color-dot" style="background:${c.hex}"></div>`
    ).join('');

    const imgEl = `<img class="product-img" src="${firstColor.img}"
      onerror="this.outerHTML='<div class=product-img-placeholder>${p.emoji}</div>'"
      alt="${p.name}">`;

    return `
      <div class="product-card" onclick="openDetail('${p.id}')">
        ${imgEl}
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-colors">${dots}</div>
          <div class="product-price">${formatPrice(p.price)}</div>
        </div>
      </div>`;
  }).join('');
}

// ── TABS ──
function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === (tab === 'shop'));
  });
  document.getElementById('shopScreen').classList.toggle('active', tab === 'shop');
  document.getElementById('cartScreen').classList.toggle('active', tab === 'cart');
  if (tab === 'cart') renderCart();
}

function showCart() { showTab('cart'); }

// ── PRODUCT DETAIL ──
function openDetail(id) {
  currentProduct = PRODUCTS.find(p => p.id === id);
  selectedColor = null;

  document.getElementById('detailTitle').textContent = currentProduct.name;
  document.getElementById('detailName').textContent = currentProduct.name;
  document.getElementById('detailPrice').textContent = `${formatPrice(currentProduct.price)}`;
  document.getElementById('detailDesc').textContent = currentProduct.description;

  // Image
  const imgDiv = document.getElementById('detailImg');
  imgDiv.innerHTML = `<img class="detail-img" id="detailMainImg"
    src="${currentProduct.colors[0].img}"
    onerror="this.outerHTML='<div class=detail-img-placeholder>${currentProduct.emoji}</div>'"
    alt="${currentProduct.name}">`;

  // Colors
  const colorDiv = document.getElementById('colorOptions');
  colorDiv.innerHTML = currentProduct.colors.map((c, i) => `
    <div class="color-option" onclick="selectColor(${i})" id="colorOpt${i}">
      <div class="color-swatch" style="background:${c.hex}"></div>
      <div class="color-label">${c.name}</div>
    </div>`).join('');

  const addBtn = document.getElementById('addBtn');
  addBtn.disabled = true;
  addBtn.textContent = 'Выбери цвет';
  addBtn.className = 'add-btn';

  document.getElementById('detailScreen').classList.add('active');
}

function closeDetail() {
  document.getElementById('detailScreen').classList.remove('active');
  currentProduct = null;
  selectedColor = null;
}

function selectColor(idx) {
  selectedColor = currentProduct.colors[idx];

  document.querySelectorAll('.color-option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });

  // Update main image
  const img = document.getElementById('detailMainImg');
  if (img) {
    img.style.opacity = '0.5';
    img.src = selectedColor.img;
    img.onload = () => { img.style.opacity = '1'; };
    img.onerror = () => {
      img.outerHTML = `<div class="detail-img-placeholder">${currentProduct.emoji}</div>`;
    };
  }

  const addBtn = document.getElementById('addBtn');
  addBtn.disabled = false;

  // Check if already in cart
  const exists = cart.find(i => i.productId === currentProduct.id && i.color === selectedColor.name);
  if (exists) {
    addBtn.textContent = '✓ Уже в корзине';
    addBtn.className = 'add-btn added';
  } else {
    addBtn.textContent = `Добавить в корзину — ${formatPrice(currentProduct.price)}`;
    addBtn.className = 'add-btn';
  }
}

// ── CART ──
function addToCart() {
  if (!selectedColor) return;

  const exists = cart.find(i => i.productId === currentProduct.id && i.color === selectedColor.name);
  if (exists) {
    showToast('Уже в корзине');
    return;
  }

  cart.push({
    productId: currentProduct.id,
    name:      currentProduct.name,
    color:     selectedColor.name,
    colorHex:  selectedColor.hex,
    img:       selectedColor.img,
    emoji:     currentProduct.emoji,
    price:     currentProduct.price,
  });

  updateCartBadge();
  showToast(`${currentProduct.name} (${selectedColor.name}) добавлен!`);

  const addBtn = document.getElementById('addBtn');
  addBtn.textContent = '✓ В корзине';
  addBtn.className = 'add-btn added';
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartBadge();
  renderCart();
}

function updateCartBadge() {
  const btn  = document.getElementById('cartBtn');
  const badge = document.getElementById('cartCount');
  badge.textContent = cart.length;
  btn.classList.toggle('has-items', cart.length > 0);
}

function renderCart() {
  const el = document.getElementById('cartContent');

  if (cart.length === 0) {
    el.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div class="cart-empty-text">Корзина пуста</div>
      </div>`;
    return;
  }

  const total = cart.reduce((sum, i) => sum + i.price, 0);

  const items = cart.map((item, idx) => {
    const imgEl = `<img class="cart-item-img" src="${item.img}"
      onerror="this.outerHTML='<div class=cart-item-img-placeholder>${item.emoji}</div>'"
      alt="${item.name}">`;

    return `
      <div class="cart-item">
        ${imgEl}
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-detail">
            <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${item.colorHex};border:1px solid rgba(0,0,0,0.15);vertical-align:middle;margin-right:4px"></span>
            ${item.color}
          </div>
          <div class="cart-item-price">${formatPrice(item.price)}</div>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${idx})">✕</button>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="cart-items">${items}</div>
    <div class="cart-footer">
      <div class="cart-total">
        <div class="cart-total-label">Итого</div>
        <div class="cart-total-price">${formatPrice(total)}</div>
      </div>
      <div class="cart-note">После оформления заявки наш менеджер свяжется с тобой для уточнения деталей и доставки.</div>
      <button class="checkout-btn" onclick="checkout()">✓ Оформить заявку</button>
    </div>`;
}

// ── CHECKOUT ──
function checkout() {
  if (cart.length === 0) return;

  const orderData = {
    items: cart.map(i => ({ name: i.name, color: i.color, price: i.price })),
    total: cart.reduce((sum, i) => sum + i.price, 0),
  };

  if (window.Telegram?.WebApp) {
    Telegram.WebApp.sendData(JSON.stringify(orderData));
  } else {
    // Dev mode — show success
    showSuccess();
  }
}

function showSuccess() {
  document.getElementById('mainTabs').style.display = 'none';
  document.getElementById('shopScreen').classList.remove('active');
  document.getElementById('cartScreen').classList.remove('active');

  const body = document.body;
  const success = document.createElement('div');
  success.className = 'success-screen active';
  success.innerHTML = `
    <div class="success-icon">🎉</div>
    <div class="success-title">Заявка оформлена!</div>
    <div class="success-text">Наш менеджер скоро свяжется с тобой<br>для уточнения деталей.</div>`;
  body.appendChild(success);
  cart = [];
  updateCartBadge();
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
